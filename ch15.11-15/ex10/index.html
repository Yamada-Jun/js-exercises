<!DOCTYPE html>
<html lang="ja">
<head>
    <title>Canvas Demo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <script type="module" src="/ch15.11-15/ex10/index.js"></script>
    <!-- inline で以下に css かく-->
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }

        input#image {
            margin-bottom: 20px;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
        }

        canvas {
            border: 1px solid #ccc;
        }

        p {
            margin: 5px 0;
            font-size: 14px;
            color: #333;
        }

        /* These CSS styles all apply to the SVG elements defined below */
        #clock { /* Styles for everything in the clock:*/
            stroke: black; /* black lines */
            stroke-linecap: round; /* with rounded ends */
            fill: #ffe; /* on an off-white background */
        }

            #clock .face {
                stroke-width: 3;
            }
            /* Clock face outline */
            #clock .ticks {
                stroke-width: 2;
            }
            /* Lines that mark each hour */
            #clock .hands {
                stroke-width: 3;
            }
            /* How to draw the clock hands */
            #clock .numbers { /* How to draw the numbers */
                font-family: sans-serif;
                font-size: 10;
                font-weight: bold;
                text-anchor: middle;
                stroke: none;
                fill: black;
            }
    </style>
</head>
<body>
    <input id="image" type="file" accept="image/*" />
    <div class="canvas-container">
        <canvas id="original"></canvas>
        <p>元画像</p>
    </div>
    <p>動くオブジェクトとしての時計</p>
    <svg id="clock" viewBox="0 0 100 100" width="250" height="250">
        <!-- The width and height attributes are the screen size of the graphic -->
        <!-- The viewBox attribute gives the internal coordinate system -->
        <circle class="face" cx="50" cy="50" r="45" />  <!-- the clock face -->
        <g class="ticks">
            <!-- tick marks for each of the 12 hours -->
            <line x1='50' y1='5.000' x2='50.00' y2='10.00' />
            <line x1='72.50' y1='11.03' x2='70.00' y2='15.36' />
            <line x1='88.97' y1='27.50' x2='84.64' y2='30.00' />
            <line x1='95.00' y1='50.00' x2='90.00' y2='50.00' />
            <line x1='88.97' y1='72.50' x2='84.64' y2='70.00' />
            <line x1='72.50' y1='88.97' x2='70.00' y2='84.64' />
            <line x1='50.00' y1='95.00' x2='50.00' y2='90.00' />
            <line x1='27.50' y1='88.97' x2='30.00' y2='84.64' />
            <line x1='11.03' y1='72.50' x2='15.36' y2='70.00' />
            <line x1='5.000' y1='50.00' x2='10.00' y2='50.00' />
            <line x1='11.03' y1='27.50' x2='15.36' y2='30.00' />
            <line x1='27.50' y1='11.03' x2='30.00' y2='15.36' />
        </g>
        <g class="numbers">
            <!-- Number the cardinal directions-->
            <text x="50" y="18">12</text>
            <text x="85" y="53">3</text>
            <text x="50" y="88">6</text>
            <text x="15" y="53">9</text>
        </g>
        <g class="hands">
            <!-- Draw hands pointing straight up. -->
            <line class="hourhand" x1="50" y1="50" x2="50" y2="25" />
            <line class="minutehand" x1="50" y1="50" x2="50" y2="20" />
            <line class="secondhand" x1="50" y1="50" x2="50" y2="15" style="stroke-width:2" /> <!-- Second hand -->
        </g>
    </svg>
    <script src="clock.js"></script>
    <div class="canvas-container">
        <canvas id="filtered"></canvas>
        <p>フィルタ適用画像</p>
    </div>
</body>
</html>
